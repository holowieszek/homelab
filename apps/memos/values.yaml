app-template:
  controllers:
    main:
      containers:
        main:
          image:
            repository: neosmemo/memos
            tag: stable
          env:
            MEMOS_INSTANCE_URL: "https://memos.internal.mateuszholowieszko.com"
  service:
    main:
      ports:
        http:
          port: 5230
          protocol: HTTP
  ingress:
    main:
      enabled: true
      className: traefik
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
        kubernetes.io/ingress.class: "traefik"
      hosts:
        - host: memos.internal.mateuszholowieszko.com
          paths:
            - path: /
              pathType: Prefix
              service:
                name: main
                port: http
      tls:
        - hosts:
            - memos.internal.mateuszholowieszko.com
          secretName: memos-internal-mateuszholowieszko-com-tls
  persistence:
    config:
      enabled: true
      type: persistentVolumeClaim
      accessMode: ReadWriteOnce
      storageClass: longhorn
      size: 5Gi